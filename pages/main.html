<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issues Tracker</title>
    <link
      rel="shortcut icon"
      href="../assets/github-logo.png"
      type="image/x-icon"
    />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Daisy ui and tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Style Sheet -->
    <link rel="stylesheet" href="../style/style.css" />
  </head>
  <body class="min-h-screen">
    <header>
      <!-- Navbar -->
      <nav>
        <div class="navbar bg-base-100 shadow-sm px-2 justify-center">
          <div class="w-7/12 flex items-center gap-1">
            <img
              class="w-6 md:w-8 h-6 md:h-8 p-0"
              src="../assets/github-logo.png"
              alt=""
              srcset=""
            />
            <a class="font-semibold text-sm md:text-lg lg:text-xl p-0"
              >GitHub Issues Tracker</a
            >
          </div>
          <div class="flex justify-center gap-2">
            <label class="input w-1/3 md:w-2/3 flex-1 text-[12px] md:text-lg">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input type="search" required placeholder="Search" />
            </label>
            <button class="btn btn-primary w-fit text-[12px] md:text-lg m-0">
              <i class="fa-solid fa-plus"></i>New Issue
            </button>
          </div>
        </div>
      </nav>
    </header>
    <!-- Level button section -->
    <section
      class="container mx-auto mt-8 bg-white rounded-md flex py-4 px-8 gap-5"
    >
      <button onclick="displayIssues(allIssues)" class="btn btn-primary">All</button>
      <button onclick="filterIssues('open')" class="btn btn-primary">open</button>
      <button onclick="filterIssues('closed')" class="btn btn-primary">close</button>
    </section>
    <!-- Issues count section -->
    <section
      class="container mx-auto mt-8 bg-white rounded-md flex py-4 px-8 gap-5"
    >
      <div class="flex  items-center justify-center gap-3 w-full ">
        <div class="flex-1 flex items-center gap-2">
          <div class="p-2 rounded-full bg-purple-100"><img class="w-8 h-8 " src="../assets/Aperture.png" alt="" srcset="" /></div>
          <div class="flex flex-col items-start">
            <h2 class="font-semibold text-lg"><span id="issuesCount">0</span> Issues</h2>
            <p class="text-gray-400 text-sm ">Track and manage your project issues</p>
          </div>
        </div>
        <div class="flex  gap-2 justify-end">
          <div class="flex  gap-2 items-center"><img class="w-6 h-6" src="../assets/Open-Status.png" alt="" srcset="">Open</div>
          <div class="flex  gap-2 items-center"><img class="w-6 h-6" src="../assets/Closed- Status .png" alt="" srcset="">Closed</div>
        </div>
      </div>
    </section>
    <!-- Display Issues section -->
     <section class="container mx-auto mt-1 rounded-md flex py-4 gap-6">

      <div  id="issuesDiv" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 justify-around mx-auto gap-2">
        <div class="w-fit bg-white flex flex-col p-10 rounded-lg shadow-black shadow-inner ">
          <div class="flex justify-between">
            <img class="w-6 h-6" src="../assets/Open-Status.png" alt="" srcset="">
            <button class="btn text-orange-400 bg-[#fdfdfd] rounded-4xl border-orange-400">High</button>
          </div>
          <div class="text-lg md:text-xl font-semibold">Fix navigation menu on mobile devices</div>
          <div class="text-gray-400 text-sm">The navigation menu doesn't collapse properly on mobile devices...</div>
          <div class="flex justify-center gap-2">
            <button class="btn text-orange-400 bg-[#fdfdfd] rounded-4xl border-orange-400"><i class="fa-solid fa-bug"></i>BUG</button>
            <button class="btn text-purple-500  rounded-4xl border-purple-600"><img class="w-6 h-6" src="../assets/Aperture.png" alt="" srcset="">help wanted</button>
          </div>
          <div class="mt-5 flex flex-col justify-center items-start">
            <p>#1by john_doe</p>
            <p>1/15/2024</p>
          </div>
        </div>

      </div>

     </section>

     <!-- JS file -->
     <script src="../js/main.js"></script>
  </body>
</html>
